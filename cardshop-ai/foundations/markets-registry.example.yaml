        figmaNodeId: "1234:5678"
      - id: AU-EXPLORER
        name: "Explorer Credit Card"
        status: active
        productType: credit
        pageUrl: "https://www.americanexpress.com/au/credit-cards/explorer"
        figmaNodeId: "1234:9012"
      - id: AU-QANTAS-ULTIMATE
        name: "Qantas Ultimate Card"
        status: coming-soon
        productType: co-brand
        pageUrl: "https://www.americanexpress.com/au/credit-cards/qantas-ultimate"
